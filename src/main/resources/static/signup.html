<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Up & Sign-In</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }
        .container {
            width: 100%;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        input, button {
            width: 90%;
            margin: 10px 0;
            padding: 10px;
            font-size: 16px;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .hidden {
            display: none;
        }
        a {
            color: #007BFF;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <!-- Landing Page -->
    <div id="landingPage" class="container">
        <h2>Welcome</h2>
        <button onclick="showSignUp()">Sign-Up</button>
        <button onclick="showSignIn()">Sign-In</button>
    </div>

    <!-- Sign-Up Form -->
    <div id="signUpForm" class="container hidden">
        <h2>Sign-Up</h2>
        <form>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <input type="text" placeholder="First Name" required>
            <input type="text" placeholder="Last Name" required>
            <input type="text" placeholder="Street Name" required>
            <input type="text" placeholder="Street Number" required>
            <input type="text" placeholder="City" required>
            <input type="text" placeholder="Country" required>
            <input type="text" placeholder="Postal Code" required>
            <button type="submit">Register</button>
            <button type="button" onclick="goBack()">Back</button>
        </form>
    </div>

    <!-- Sign-In Form -->
    <div id="signInForm" class="container hidden">
        <h2>Sign-In</h2>
        <form>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <a href="#" onclick="showForgotPassword()">Forgot Password?</a>
            <button type="button" onclick="goBack()">Back</button>
        </form>
    </div>

    <!-- Forgot Password -->
    <div id="forgotPasswordForm" class="container hidden">
        <h2>Reset Password</h2>
        <form>
            <input type="text" placeholder="Enter your username or email" required>
            <button type="submit">Reset</button>
            <button type="button" onclick="showSignIn()">Back</button>
        </form>
    </div>

    <script>
        function showSignUp() {
            document.getElementById("landingPage").classList.add("hidden");
            document.getElementById("signUpForm").classList.remove("hidden");
        }

        function showSignIn() {
            document.getElementById("landingPage").classList.add("hidden");
            document.getElementById("signInForm").classList.remove("hidden");
        }

        function showForgotPassword() {
            document.getElementById("signInForm").classList.add("hidden");
            document.getElementById("forgotPasswordForm").classList.remove("hidden");
        }

        function goBack() {
            document.querySelectorAll(".container").forEach(el => el.classList.add("hidden"));
            document.getElementById("landingPage").classList.remove("hidden");
        }
    </script>

</body>
</html>
