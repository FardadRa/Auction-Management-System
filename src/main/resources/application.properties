# === DATABASE CONFIGURATION ===
spring.datasource.url=jdbc:postgresql://ep-silent-credit-a8sg6lri-pooler.eastus2.azure.neon.tech/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_3JPctVK0gYvw
spring.datasource.driver-class-name=org.postgresql.Driver

# === JPA / HIBERNATE SETTINGS ===
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# === CONNECTION POOL SETTINGS ===
# Configuring HikariCP for better performance
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# === LOGGING CONFIGURATION ===
# Enable SQL query logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# === SERVER CONFIGURATION ===
server.port=8080
server.error.include-message=always

# === HTML Implementation  ===
spring.web.mvc.view.prefix=/templates/
spring.web.mvc.view.suffix=.html
